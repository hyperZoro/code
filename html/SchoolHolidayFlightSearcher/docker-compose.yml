services:
  flight-searcher:
    build: .
    container_name: flight-searcher
    restart: unless-stopped
    environment:
      FLIGHT_PROVIDER: ${FLIGHT_PROVIDER:-mock}
      PORT: 3000
      HOST: 0.0.0.0
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      SERPAPI_CURRENCY: ${SERPAPI_CURRENCY:-GBP}
      SERPAPI_GOOGLE_COUNTRY: ${SERPAPI_GOOGLE_COUNTRY:-uk}
      SERPAPI_LANGUAGE: ${SERPAPI_LANGUAGE:-en}
      SERPAPI_MAX_DATE_PAIRS: ${SERPAPI_MAX_DATE_PAIRS:-4}
      SERPAPI_RESULTS_PER_PAIR: ${SERPAPI_RESULTS_PER_PAIR:-5}
      SERPAPI_RETURN_DETAILS_LIMIT: ${SERPAPI_RETURN_DETAILS_LIMIT:-3}
      SERPAPI_RETURN_REVERSE_FALLBACK: ${SERPAPI_RETURN_REVERSE_FALLBACK:-true}
      SERPAPI_STOPS: ${SERPAPI_STOPS:-2}
      SERPAPI_DEEP_SEARCH: ${SERPAPI_DEEP_SEARCH:-false}
      GEMINI_MODEL: gemini-2.5-flash-lite
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3010:3000"
