# Option A: same Nginx Docker network as the app container.
# This exposes the app at:
#   http://YOUR-SERVER/flight-searcher/
#
# Add this inside your existing server { ... } block.
# Keep your existing locations unchanged.

location = /flight-searcher {
    return 301 /flight-searcher/;
}

location /flight-searcher/ {
    proxy_pass http://flight-searcher:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

